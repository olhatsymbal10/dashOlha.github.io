name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Usa 'master' se il tuo branch principale si chiama così

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_ADMIN_EMAIL: ${{ secrets.VITE_SUPABASE_ADMIN_EMAIL }}
          VITE_SUPABASE_ADMIN_PASSWORD: ${{ secrets.VITE_SUPABASE_ADMIN_PASSWORD }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4